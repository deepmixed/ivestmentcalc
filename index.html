<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>複利試算</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424; --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14); --text: #f0f0f0; --text2: #999; --text3: #666; --accent: #378ADD; --accent-bg: rgba(55,138,221,0.12); --success: #1D9E75; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem 4rem; }
    .container { max-width: 640px; margin: 0 auto; }
    header { margin-bottom: 2rem; }
    .eyebrow { font-size: 11px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
    h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
    h1 span { color: var(--text2); font-weight: 400; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.75rem; }
    .stat { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem; }
    .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); line-height: 1; }
    .stat-unit { font-size: 12px; color: var(--text2); margin-top: 3px; }
    .stat.highlight .stat-value { color: var(--accent); }
    .panel { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 1.25rem 1.4rem; margin-bottom: 1rem; }
    .panel-title { font-size: 11px; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 1.1rem; }
    .ctrl-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
    .ctrl-row:last-child { margin-bottom: 0; }
    .ctrl-label { font-size: 13px; color: var(--text2); width: 76px; flex-shrink: 0; }
    .ctrl-val { font-size: 13px; font-weight: 600; min-width: 60px; text-align: right; color: var(--text); }
    input[type=range] { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: var(--bg3); outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--text); border: 2px solid var(--bg2); box-shadow: 0 0 0 1px var(--border2); cursor: pointer; }
    input[type=range]:disabled { opacity: 0.3; cursor: default; }
    .stages-section { margin-bottom: 1rem; }
    .stage-block { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 1.1rem 1.4rem; margin-bottom: 0.75rem; position: relative; }
    .stage-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .stage-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: var(--accent); background: var(--accent-bg); border-radius: 20px; padding: 3px 12px; }
    .remove-btn { background: none; border: 0.5px solid var(--border); border-radius: 6px; color: var(--text3); cursor: pointer; font-size: 14px; line-height: 1; padding: 3px 8px; }
    .add-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 10px; background: none; border: 0.5px dashed var(--border2); border-radius: 12px; color: var(--text3); font-size: 13px; cursor: pointer; margin-bottom: 1rem; }
    .chart-panel { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 1.25rem 1.4rem; margin-bottom: 1rem; }
    .legend { display: flex; gap: 16px; margin-bottom: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    canvas { width: 100% !important; display: block; }
    .milestones { margin-top: 1rem; display: flex; flex-direction: column; gap: 4px; }
    .milestone { font-size: 12px; color: var(--text3); }
    .milestone span { color: var(--success); font-weight: 600; }
    .note { font-size: 11px; color: var(--text3); text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="eyebrow">複利シミュレーター</div>
    <h1>資産成長 <span>試算ツール</span></h1>
  </header>
  <div class="summary-grid">
    <div class="stat highlight"><div class="stat-label">最終資産</div><div class="stat-value" id="s-final">—</div><div class="stat-unit">万円</div></div>
    <div class="stat"><div class="stat-label">総投入</div><div class="stat-value" id="s-invest">—</div><div class="stat-unit">万円</div></div>
    <div class="stat"><div class="stat-label">運用益</div><div class="stat-value" id="s-gain">—</div><div class="stat-unit">万円</div></div>
  </div>
  <div class="panel">
    <div class="panel-title">基本設定</div>
    <div class="ctrl-row"><span class="ctrl-label">年間利回り</span><input type="range" id="rate" min="1" max="20" step="0.5" value="8"><span class="ctrl-val"><span id="rate-out">8</span>%</span></div>
    <div class="ctrl-row"><span class="ctrl-label">運用年数</span><input type="range" id="years" min="1" max="40" step="1" value="15"><span class="ctrl-val"><span id="years-out">15</span>年</span></div>
    <div class="ctrl-row"><span class="ctrl-label">初期元本</span><input type="range" id="principal" min="0" max="5000" step="50" value="1000"><span class="ctrl-val"><span id="principal-out">1,000</span>万</span></div>
  </div>
  <div class="panel-title" style="font-size:11px;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;margin-bottom:0.75rem;padding-left:2px;">毎月の積立（段階設定）</div>
  <div class="stages-section">
    <div id="stages-container"></div>
    <button class="add-btn" id="add-stage-btn">＋ 積立フェーズを追加</button>
  </div>
  <div class="chart-panel">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>積立あり</div>
      <div class="legend-item"><div class="legend-dot" style="background:#555"></div>積立なし</div>
    </div>
    <canvas id="chart" height="200"></canvas>
    <div class="milestones">
      <div class="milestone" id="milestone-3000"></div>
      <div class="milestone" id="milestone-5000"></div>
    </div>
  </div>
  <div class="note">※ 初期元本 <span id="note-principal">1,000</span>万円を想定</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
  const stages=[{years:5,monthly:10},{years:10,monthly:20}];
  function getTotalYears(){return parseInt(document.getElementById('years').value);}
  function getRate(){return parseFloat(document.getElementById('rate').value);}
  function getPrincipal(){return parseInt(document.getElementById('principal').value);}
  function renderStages(){
    const totalYears=getTotalYears(),container=document.getElementById('stages-container');
    container.innerHTML='';let usedYears=0;
    stages.forEach((s,i)=>{
      const isLast=i===stages.length-1,yearStart=usedYears+1;
      const yearEnd=isLast?totalYears:Math.min(usedYears+s.years,totalYears);
      usedYears+=s.years;
      const block=document.createElement('div');block.className='stage-block';
      const stageYears=isLast?(yearEnd-(stages.slice(0,i).reduce((a,c)=>a+c.years,0))):Math.min(s.years,totalYears-1);
      block.innerHTML=`<div class="stage-header"><div class="stage-badge">フェーズ ${i+1}：${yearStart}〜${yearEnd}年目</div>${stages.length>1?`<button class="remove-btn" data-idx="${i}">✕</button>`:''}</div><div class="ctrl-row"><span class="ctrl-label">積立期間</span>${isLast?`<input type="range" disabled value="${stageYears}" min="1" max="${totalYears}"><span class="ctrl-val">${stageYears}年（残り）</span>`:`<input type="range" data-idx="${i}" data-field="years" min="1" max="${totalYears-1}" step="1" value="${Math.min(s.years,totalYears-1)}"><span class="ctrl-val" id="sy-${i}">${Math.min(s.years,totalYears-1)}年</span>`}</div><div class="ctrl-row"><span class="ctrl-label">月積立額</span><input type="range" data-idx="${i}" data-field="monthly" min="0" max="100" step="1" value="${s.monthly}"><span class="ctrl-val" id="sm-${i}">${s.monthly}万/月</span></div>`;
      container.appendChild(block);
    });
    container.querySelectorAll('input[type=range][data-idx]').forEach(inp=>{
      inp.addEventListener('input',()=>{
        const idx=parseInt(inp.dataset.idx),field=inp.dataset.field;
        stages[idx][field]=parseFloat(inp.value);
        if(field==='years')document.getElementById(`sy-${idx}`).textContent=inp.value+'年';
        else document.getElementById(`sm-${idx}`).textContent=inp.value+'万/月';
        renderStages();recalc();
      });
    });
    container.querySelectorAll('.remove-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{stages.splice(parseInt(btn.dataset.idx),1);renderStages();recalc();});
    });
  }
  function getMonthlyForYear(year){
    let acc=0;for(let i=0;i<stages.length;i++){const span=i===stages.length-1?Infinity:stages[i].years;if(year<=acc+span)return stages[i].monthly;acc+=span;}
    return stages[stages.length-1].monthly;
  }
  let chart;
  function recalc(){
    const totalYears=getTotalYears(),rate=getRate()/100,principal=getPrincipal(),monthlyRate=rate/12;
    const withArr=[principal],withoutArr=[principal];let totalInvested=principal;
    for(let y=1;y<=totalYears;y++){
      const monthly=getMonthlyForYear(y);let val=withArr[y-1];
      for(let m=0;m<12;m++)val=val*(1+monthlyRate)+monthly;
      withArr.push(Math.round(val));totalInvested+=monthly*12;
      withoutArr.push(Math.round(withoutArr[y-1]*Math.pow(1+rate,1)));
    }
    const finalVal=withArr[totalYears],invested=Math.round(totalInvested);
    document.getElementById('s-final').textContent=finalVal.toLocaleString();
    document.getElementById('s-invest').textContent=invested.toLocaleString();
    document.getElementById('s-gain').textContent=(finalVal-invested).toLocaleString();
    document.getElementById('note-principal').textContent=principal.toLocaleString();
    const labels=Array.from({length:totalYears+1},(_,i)=>i===0?'0年':`${i}年`);
    const m3=withArr.findIndex(v=>v>=3000),m5=withArr.findIndex(v=>v>=5000);
    document.getElementById('milestone-3000').innerHTML=m3>0?`<span>${m3}年</span>で 3,000万円 到達`:'';
    document.getElementById('milestone-5000').innerHTML=m5>0?`<span>${m5}年</span>で 5,000万円 到達`:'';
    if(chart){chart.data.labels=labels;chart.data.datasets[0].data=withArr;chart.data.datasets[1].data=withoutArr;chart.update();}
    else{
      const ctx=document.getElementById('chart').getContext('2d');
      chart=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'積立あり',data:withArr,borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.07)',fill:true,tension:0.35,pointRadius:2,borderWidth:2},{label:'積立なし',data:withoutArr,borderColor:'#555',backgroundColor:'transparent',fill:false,tension:0.35,pointRadius:2,borderWidth:1.5,borderDash:[4,3]}]},options:{responsive:true,animation:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}万円`}}},scales:{y:{ticks:{color:'#666',callback:v=>v.toLocaleString()+'万',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}},x:{ticks:{color:'#666',font:{size:11},maxTicksLimit:10},grid:{color:'rgba(255,255,255,0.04)'}}}}});
    }
  }
  document.getElementById('rate').addEventListener('input',e=>{document.getElementById('rate-out').textContent=e.target.value;recalc();});
  document.getElementById('years').addEventListener('input',e=>{document.getElementById('years-out').textContent=e.target.value;renderStages();recalc();});
  document.getElementById('principal').addEventListener('input',e=>{document.getElementById('principal-out').textContent=parseInt(e.target.value).toLocaleString();recalc();});
  document.getElementById('add-stage-btn').addEventListener('click',()=>{stages.push({years:5,monthly:30});renderStages();recalc();});
  renderStages();recalc();
</script>
</body>
</html>
