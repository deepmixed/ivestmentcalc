<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>複利試算</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #c8a96e;
      --accent2: #5b8dd9;
      --text: #e8e4dc;
      --muted: #6b6880;
      --faint: #1a1a26;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif JP', serif;
      min-height: 100svh;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(91,141,217,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(200,169,110,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 40px;
    }

    /* Header */
    .header {
      padding: 48px 24px 32px;
      border-bottom: 1px solid var(--border);
    }

    .header-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--text);
    }

    .header h1 span {
      color: var(--accent);
    }

    /* Metrics strip */
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .metric {
      padding: 20px 16px;
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .metric:last-child { border-right: none; }

    .metric-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .metric-value {
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      line-height: 1;
      transition: color 0.3s;
    }

    .metric:first-child .metric-value {
      color: var(--accent);
    }

    .metric-unit {
      font-size: 9px;
      color: var(--muted);
      margin-top: 4px;
      font-family: 'DM Mono', monospace;
    }

    /* Controls */
    .controls {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      border-bottom: 1px solid var(--border);
    }

    .control-group {}

    .control-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .control-name {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }

    .control-val {
      font-family: 'DM Mono', monospace;
      font-size: 20px;
      font-weight: 400;
      color: var(--text);
    }

    /* Custom slider */
    .slider-wrap {
      position: relative;
      height: 28px;
      display: flex;
      align-items: center;
    }

    .slider-track-bg {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
    }

    .slider-track-fill {
      position: absolute;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
      transition: width 0.1s;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 28px;
      background: transparent;
      position: relative;
      z-index: 2;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--accent);
      box-shadow: 0 0 0 4px rgba(200,169,110,0.1);
      transition: box-shadow 0.2s, transform 0.15s;
    }

    input[type=range]:active::-webkit-slider-thumb {
      box-shadow: 0 0 0 8px rgba(200,169,110,0.15);
      transform: scale(1.15);
    }

    input[type=range]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--accent);
      cursor: pointer;
    }

    /* Chart area */
    .chart-section {
      padding: 24px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .chart-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .legend {
      display: flex;
      gap: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--muted);
    }

    .legend-dot {
      width: 16px;
      height: 2px;
      border-radius: 1px;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
      height: 220px;
    }

    /* Milestone tag */
    .milestone {
      margin: 0 24px;
      padding: 14px 18px;
      background: var(--faint);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .milestone strong {
      color: var(--accent);
      font-weight: 500;
    }

    /* Initial capital note */
    .footnote {
      padding: 16px 24px 0;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      opacity: 0.6;
    }

    /* Number animation */
    @keyframes countUp {
      from { opacity: 0.4; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animating { animation: countUp 0.25s ease-out forwards; }
  </style>
</head>
<body>
<div class="container">

  <header class="header">
    <div class="header-eyebrow">複利シミュレーター</div>
    <h1>資産成長<br><span>試算ツール</span></h1>
  </header>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">最終資産</div>
      <div class="metric-value" id="final">—</div>
      <div class="metric-unit">万円</div>
    </div>
    <div class="metric">
      <div class="metric-label">総投入</div>
      <div class="metric-value" id="total-in">—</div>
      <div class="metric-unit">万円</div>
    </div>
    <div class="metric">
      <div class="metric-label">運用益</div>
      <div class="metric-value" id="gain">—</div>
      <div class="metric-unit">万円</div>
    </div>
  </div>

  <section class="controls">

    <div class="control-group">
      <div class="control-header">
        <span class="control-name">年間利回り</span>
        <span class="control-val" id="rate-out">8%</span>
      </div>
      <div class="slider-wrap">
        <div class="slider-track-bg"></div>
        <div class="slider-track-fill" id="fill-rate"></div>
        <input type="range" min="3" max="20" value="8" step="1" id="rate" oninput="update()">
      </div>
    </div>

    <div class="control-group">
      <div class="control-header">
        <span class="control-name">毎月の積立</span>
        <span class="control-val" id="monthly-out">20万/月</span>
      </div>
      <div class="slider-wrap">
        <div class="slider-track-bg"></div>
        <div class="slider-track-fill" id="fill-monthly"></div>
        <input type="range" min="0" max="50" value="20" step="5" id="monthly" oninput="update()">
      </div>
    </div>

    <div class="control-group">
      <div class="control-header">
        <span class="control-name">運用年数</span>
        <span class="control-val" id="years-out">15年</span>
      </div>
      <div class="slider-wrap">
        <div class="slider-track-bg"></div>
        <div class="slider-track-fill" id="fill-years"></div>
        <input type="range" min="1" max="30" value="15" step="1" id="years" oninput="update()">
      </div>
    </div>

  </section>

  <section class="chart-section">
    <div class="chart-header">
      <span class="chart-title">資産推移</span>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background: linear-gradient(90deg, #5b8dd9, #c8a96e);"></div>
          積立あり
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: #3a3a4e; border-top: 2px dashed #555;"></div>
          積立なし
        </div>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
  </section>

  <div class="milestone" id="milestone">—</div>
  <div class="footnote">※ 初期元本 1,000万円を想定</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let myChart;

function calcGrowth(rate, monthly, years) {
  const r = rate / 100 / 12;
  const initial = 1000;
  const labels = [], withDCA = [], noDCA = [];
  for (let y = 0; y <= years; y++) {
    const months = y * 12;
    const noAdd = initial * Math.pow(1 + r, months);
    const added = r > 0 ? monthly * (Math.pow(1 + r, months) - 1) / r : monthly * months;
    labels.push(y + '年');
    withDCA.push(Math.round(noAdd + added));
    noDCA.push(Math.round(noAdd));
  }
  return { labels, withDCA, noDCA };
}

function yearsToTarget(rate, monthly, target) {
  const r = rate / 100 / 12;
  for (let m = 1; m <= 600; m++) {
    const v = r > 0
      ? 1000 * Math.pow(1 + r, m) + monthly * (Math.pow(1 + r, m) - 1) / r
      : 1000 + monthly * m;
    if (v >= target) return (m / 12).toFixed(1);
  }
  return null;
}

function updateFill(id, input) {
  const pct = (input.value - input.min) / (input.max - input.min) * 100;
  document.getElementById(id).style.width = pct + '%';
}

function animateValue(el) {
  el.classList.remove('animating');
  void el.offsetWidth;
  el.classList.add('animating');
}

function update() {
  const rate = parseInt(document.getElementById('rate').value);
  const monthly = parseInt(document.getElementById('monthly').value);
  const years = parseInt(document.getElementById('years').value);

  document.getElementById('rate-out').textContent = rate + '%';
  document.getElementById('monthly-out').textContent = monthly > 0 ? monthly + '万/月' : '積立なし';
  document.getElementById('years-out').textContent = years + '年';

  updateFill('fill-rate', document.getElementById('rate'));
  updateFill('fill-monthly', document.getElementById('monthly'));
  updateFill('fill-years', document.getElementById('years'));

  const { labels, withDCA, noDCA } = calcGrowth(rate, monthly, years);
  const final = withDCA[withDCA.length - 1];
  const totalIn = Math.round(1000 + monthly * years * 12);
  const gain = final - totalIn;

  const finalEl = document.getElementById('final');
  const totalEl = document.getElementById('total-in');
  const gainEl = document.getElementById('gain');

  finalEl.textContent = final.toLocaleString();
  totalEl.textContent = totalIn.toLocaleString();
  gainEl.textContent = gain.toLocaleString();

  animateValue(finalEl);
  animateValue(gainEl);

  // Milestone
  const target3000 = yearsToTarget(rate, monthly, 3000);
  const target5000 = yearsToTarget(rate, monthly, 5000);
  const milestoneEl = document.getElementById('milestone');

  if (target3000) {
    const parts = [`<strong>${target3000}年</strong> で 3,000万円 到達`];
    if (target5000) parts.push(`<strong>${target5000}年</strong> で 5,000万円 到達`);
    milestoneEl.innerHTML = parts.join('&ensp;／&ensp;');
  } else {
    milestoneEl.innerHTML = '3,000万円 到達は <strong>30年超</strong>';
  }

  // Chart
  const ctx = document.getElementById('chart').getContext('2d');
  if (myChart) myChart.destroy();

  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '積立あり',
          data: withDCA,
          borderColor: '#c8a96e',
          backgroundColor: (ctx) => {
            const gradient = ctx.chart.ctx.createLinearGradient(0, 0, 0, 200);
            gradient.addColorStop(0, 'rgba(200,169,110,0.18)');
            gradient.addColorStop(1, 'rgba(200,169,110,0)');
            return gradient;
          },
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          pointHoverRadius: 5,
          borderWidth: 2
        },
        {
          label: '積立なし',
          data: noDCA,
          borderColor: '#3a3a55',
          borderDash: [4, 4],
          fill: false,
          tension: 0.4,
          pointRadius: 0,
          pointHoverRadius: 4,
          borderWidth: 1.5
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a26',
          borderColor: '#2e2e42',
          borderWidth: 1,
          titleColor: '#6b6880',
          bodyColor: '#e8e4dc',
          titleFont: { family: 'DM Mono', size: 10 },
          bodyFont: { family: 'DM Mono', size: 12 },
          padding: 12,
          callbacks: {
            title: items => items[0].label,
            label: ctx => ' ' + ctx.dataset.label + '  ' + ctx.parsed.y.toLocaleString() + '万'
          }
        }
      },
      scales: {
        y: {
          ticks: {
            callback: v => v >= 10000 ? (v/10000).toFixed(1) + '億' : v.toLocaleString() + '万',
            font: { family: 'DM Mono', size: 10 },
            color: '#6b6880',
            maxTicksLimit: 5
          },
          grid: { color: 'rgba(255,255,255,0.04)' },
          border: { color: 'transparent' }
        },
        x: {
          ticks: {
            font: { family: 'DM Mono', size: 10 },
            color: '#6b6880',
            autoSkip: true,
            maxTicksLimit: 8
          },
          grid: { display: false },
          border: { color: 'rgba(255,255,255,0.06)' }
        }
      }
    }
  });
}

update();
</script>
</body>
</html>
